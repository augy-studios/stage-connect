<body>
    <div class="card">
        <div class="logo">
            <img src="/SCL-main.png" width="32" height="32" style="object-fit:contain" alt="Stage Connect" />
            <span style="font-size:1.2rem;color:#1a2e1a">Stage Connect Live</span>
        </div>
        <h1>Join a Stage</h1>
        <p>Enter the stage slug or scan the QR code from your presenter.</p>
        <input id="slug-input" placeholder="stage-slug" autocomplete="off" spellcheck="false" />
        <button onclick="go()">Join Stage</button>
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js');
        }

        function go() {
            const slug = document.getElementById('slug-input').value.trim().toLowerCase().replace(/[^a-z0-9-]/g, '-')
                .replace(/-+/g, '-').replace(/^-|-$/g, '');
            if (slug) window.location.href = '/' + slug;
        }

        document.getElementById('slug-input').addEventListener('keydown', e => {
            if (e.key === 'Enter') go();
        });
    </script>

</body>
