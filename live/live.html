<!doctype html>
<html lang="en">

<head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-FMCYFTFPEL"></script>
    <script>
        window.dataLayer = window.dataLayer || [];

        function gtag() {
            dataLayer.push(arguments);
        }
        gtag('js', new Date());

        gtag('config', 'G-FMCYFTFPEL');
    </script>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9715826188316382"
        crossorigin="anonymous"></script>

    <link rel="manifest" href="/manifest.json" />

    <meta charset="utf-8">
    <title>Stage Connect Live | UwU Apps</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Join a live interactive stage — polls, Q&A, quizzes, and more.">

    <meta property="og:type" content="website">
    <meta property="og:title" content="Stage Connect Live | UwU Apps" />
    <meta property="og:site_name" content="UwU Apps" />
    <meta property="og:description" content="Join a live interactive stage — polls, Q&A, quizzes, and more." />

    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Jua">
    <link rel="stylesheet" href="/live.css">
    <meta name="theme-color" content="#ccffcc" />

    <!-- Embed Image -->
    <link rel="apple-touch-icon" href="/SCL-main.png">
    <link rel="icon" href="/favicon.ico">
    <link rel="shortcut icon" href="/favicon.ico">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:image:src" content="/SCL-main.png">
    <meta property="og:image" content="/SCL-main.png" />

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <script defer="" src="https://use.fontawesome.com/releases/v6.5.2/js/all.js"></script>
</head>

<body>
    <div id="toast-container" aria-live="polite"></div>

    <!-- Theme Picker Modal -->
    <div id="theme-modal" class="modal-overlay" role="dialog" aria-modal="true" aria-label="Choose Theme" hidden>
        <div class="modal-box">
            <div class="modal-header">
                <span class="modal-title">Choose Theme</span>
                <button class="modal-close" id="theme-modal-close" aria-label="Close">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="6" x2="6" y2="18" /><line x1="6" y1="6" x2="18" y2="18" />
                    </svg>
                </button>
            </div>
            <div class="theme-grid">
                <button class="theme-swatch" data-theme="classic" title="Classic"><span class="swatch-color" style="background:#ccffcc"></span><span class="swatch-label">Classic</span></button>
                <button class="theme-swatch" data-theme="ng1" title="Not Green 1"><span class="swatch-color" style="background:#ffcccc"></span><span class="swatch-label">Not Green 1</span></button>
                <button class="theme-swatch" data-theme="ng2" title="Not Green 2"><span class="swatch-color" style="background:#ccccff"></span><span class="swatch-label">Not Green 2</span></button>
                <button class="theme-swatch" data-theme="ng3" title="Not Green 3"><span class="swatch-color" style="background:#ffffcc"></span><span class="swatch-label">Not Green 3</span></button>
                <button class="theme-swatch" data-theme="ng4" title="Not Green 4"><span class="swatch-color" style="background:#ffccff"></span><span class="swatch-label">Not Green 4</span></button>
                <button class="theme-swatch" data-theme="ng5" title="Not Green 5"><span class="swatch-color" style="background:#ccffff"></span><span class="swatch-label">Not Green 5</span></button>
                <button class="theme-swatch" data-theme="light" title="Really Really Light Green"><span class="swatch-color" style="background:#ffffff;border:1px solid #ddd"></span><span class="swatch-label">Really Really Light Green</span></button>
            </div>
        </div>
    </div>

    <!-- Top bar -->
    <header class="topbar glass">
        <div class="topbar-brand">
            <svg class="brand-icon" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect x="4" y="24" width="32" height="4" rx="2" fill="var(--brand)" />
                <rect x="8" y="6" width="24" height="16" rx="3" fill="var(--brand)" opacity="0.4" />
                <circle cx="20" cy="14" r="4" fill="var(--brand)" />
            </svg>
            <span class="brand-name">Stage Connect <span class="live-badge">LIVE</span></span>
        </div>
        <div id="stage-title-display" class="stage-title-display"></div>
        <div class="topbar-actions">
            <a href="https://donate.stripe.com/28o2akeAr3hv0DK6oo" target="_blank" rel="noopener noreferrer"
                class="btn btn-ghost btn-icon" title="Buy Augy a Coffee">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M18 8h1a4 4 0 0 1 0 8h-1" />
                    <path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z" />
                    <line x1="6" y1="1" x2="6" y2="4" /><line x1="10" y1="1" x2="10" y2="4" /><line x1="14" y1="1" x2="14" y2="4" />
                </svg>
                <span class="btn-label">Buy me a coffee</span>
            </a>
            <button class="btn btn-ghost btn-icon" id="theme-btn" title="Change Theme" aria-label="Change Theme">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="5" />
                    <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" />
                </svg>
            </button>
        </div>
    </header>

    <!-- Name prompt -->
    <div id="name-prompt" class="name-prompt-overlay" hidden>
        <div class="name-card glass">
            <div class="name-card-icon">
                <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect x="4" y="24" width="32" height="4" rx="2" fill="var(--brand)" />
                    <rect x="8" y="6" width="24" height="16" rx="3" fill="var(--brand)" opacity="0.4" />
                    <circle cx="20" cy="14" r="4" fill="var(--brand)" />
                </svg>
            </div>
            <h2 id="name-prompt-title">Joining Stage</h2>
            <p>Enter your name to participate</p>
            <div class="form-group">
                <input type="text" id="name-input" class="form-input" placeholder="Your name (optional)" maxlength="50"
                    autocomplete="name" />
            </div>
            <button class="btn btn-primary btn-full" id="name-join-btn">Join Stage</button>
        </div>
    </div>

    <!-- Not found -->
    <div id="not-found" class="center-page" hidden>
        <div class="glass center-card">
            <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" style="width:64px;height:64px">
                <rect x="6" y="40" width="52" height="8" rx="4" fill="var(--brand)" opacity="0.4" />
                <rect x="12" y="8" width="40" height="30" rx="6" fill="var(--brand)" opacity="0.2" />
                <line x1="24" y1="24" x2="40" y2="24" stroke="var(--brand)" stroke-width="3" stroke-linecap="round" />
                <line x1="32" y1="16" x2="32" y2="32" stroke="var(--brand)" stroke-width="3" stroke-linecap="round" />
            </svg>
            <h2>Stage Not Found</h2>
            <p>This stage is not live or the link has expired.</p>
        </div>
    </div>

    <!-- Live main -->
    <div id="live-main" class="live-main" hidden>
        <!-- Feature tabs -->
        <nav class="live-tabs glass" id="live-tabs"></nav>

        <!-- Panels -->
        <div class="live-content" id="live-content">
            <div id="lpanel-poll" class="live-panel" data-panel="poll" hidden></div>
            <div id="lpanel-wordcloud" class="live-panel" data-panel="wordcloud" hidden></div>
            <div id="lpanel-qa" class="live-panel" data-panel="qa" hidden></div>
            <div id="lpanel-quiz" class="live-panel" data-panel="quiz" hidden></div>
            <div id="lpanel-survey" class="live-panel" data-panel="survey" hidden></div>
            <div id="lpanel-reaction" class="live-panel" data-panel="reaction" hidden></div>
            <div id="lpanel-chat" class="live-panel" data-panel="chat" hidden></div>
            <div id="lpanel-comment" class="live-panel" data-panel="comment" hidden></div>
        </div>
    </div>

    <script src="/live.js"></script>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js');
        }
    </script>

</body>

</html>
